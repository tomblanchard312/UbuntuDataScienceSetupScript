name: validation

on:
  push:
  pull_request:

jobs:
  shell-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run shellcheck
        run: |
          find . -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -x

      - name: Run shfmt check
        run: |
          find . -type f -name "*.sh" -print0 | xargs -0 -r shfmt -d -i 2 -ci
